<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления — FlowCore</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
<div class="dashboard-layout">
    <div class="sidebar">
        <div class="logo-small">FlowCore.</div>
        <div class="nav-menu">
            <div class="nav-item" data-section="tasks">✅ Задачи</div>
            <div class="nav-item" data-section="projects">📁 Проекты</div>
            <div class="nav-item" data-section="team">👥 Команда</div>
        </div>
        <div class="user-tag">
            <div>👤</div>
            <div><span id="dashboard-user-name"></span><br><span id="dashboard-user-email"></span></div>
            <button id="logout-btn" class="btn btn-outline btn-sm">Выйти</button>
        </div>
    </div>
    <div class="main-area" id="dynamic-content"></div>
</div>

<!-- Модальное окно для создания/редактирования проекта -->
<div id="projectModal" class="modal">
    <div class="modal-content modal-wide">
        <h3 id="projectModalTitle">Создать проект</h3>
        <input type="hidden" id="edit-project-id">
        <div class="form-group"><label>Название проекта</label><input id="project-name" placeholder="Название"></div>
        <div class="form-group"><label>Описание</label><textarea id="project-desc" rows="2" placeholder="Описание проекта"></textarea></div>
        <div class="form-group"><label>Участники команды</label>
            <select id="project-members" multiple size="4"></select>
            <small>Удерживайте Ctrl для выбора нескольких</small>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn-outline" id="projectModalCancel">Отмена</button>
            <button class="btn btn-primary" id="projectModalSave">Сохранить</button>
        </div>
    </div>
</div>

<!-- Модальное окно для задачи внутри проекта -->
<div id="projectTaskModal" class="modal">
    <div class="modal-content">
        <h3 id="projectTaskModalTitle">Новая задача</h3>
        <input type="hidden" id="current-project-id">
        <input type="hidden" id="edit-project-task-id">
        <div class="form-group"><label>Название задачи</label><input id="project-task-title" placeholder="Название"></div>
        <div class="form-group"><label>Описание</label><textarea id="project-task-desc" rows="2"></textarea></div>
        <div class="form-group"><label>Исполнитель</label><select id="project-task-assignee"></select></div>
        <div class="form-group"><label>Приоритет</label>
            <select id="project-task-priority">
                <option value="High">Высокий</option>
                <option value="Medium">Средний</option>
                <option value="Low">Низкий</option>
            </select>
        </div>
        <div class="form-group"><label>Дедлайн</label><input type="date" id="project-task-deadline"></div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button class="btn btn-outline" id="projectTaskModalCancel">Отмена</button>
            <button class="btn btn-primary" id="projectTaskModalSave">Сохранить</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
