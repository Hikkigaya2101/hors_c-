<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — FlowCore</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-auth">FlowCore.</div>
        <h2>Вход в CRM</h2>
        <div class="form-group">
            <label>Логин / Email</label>
            <div class="input-icon"><span>📧</span><input type="text" id="login-username" placeholder="example@flowcore.com"></div>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <div class="input-icon"><span>🔒</span><input type="password" id="login-password" placeholder="••••••"></div>
        </div>
        <button class="btn btn-primary" id="do-login" style="width:100%">Войти</button>
        <div class="divider">или</div>
        <button class="btn btn-outline" id="google-login" style="width:100%">Продолжить с Google</button>
        <p style="text-align:center; margin-top:1.5rem;">
            Нет аккаунта? <a href="/register/" id="register-link" style="color: var(--accent-green);">Зарегистрироваться</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
